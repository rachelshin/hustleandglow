# Netlify build configuration.
#
# Pinned here (not just in the Netlify dashboard) so the build command lives in
# version control and can't silently drift. The important part is `npm run
# deploy`: it runs `expo export --platform web` AND scripts/patch-favicon.js.
# A bare `expo export` build skips the patch, which is the only thing that
# injects the favicon, web manifest, and iOS-PWA meta tags — so without this,
# none of those ship to the live site.
#
# This file overrides whatever build command is set in the Netlify UI.
[build]
  command = "npm run deploy"
  publish = "dist"

# ── Cache headers ─────────────────────────────────────────────────────────────
# This app has NO service worker, so PWA updates rely entirely on the HTTP cache.
# The rule that makes updates reliable: never cache the entry point, always cache
# the hashed assets. index.html is rewritten every build to point at a new
# index-[hash].js, so as long as the browser re-fetches index.html on launch it
# picks up the new bundle. The hashed files under /_expo/ have unique names per
# build, so they're safe to cache forever (immutable).

# Entry point + manifest: always revalidate, never serve stale.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Hashed build assets: immutable, cache for a year.
[[headers]]
  for = "/_expo/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
